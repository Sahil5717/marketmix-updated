/**
 * AtlasRail — the collapsible right-hand panel that hosts Atlas's
 * per-screen narration and suggested questions.
 *
 * When collapsed, a 56px strip remains showing only the avatar + vertical
 * label + expand button. The screen's main flow can include an
 * <AtlasInlineCallout/> so users still see Atlas's headline when the
 * rail is collapsed.
 *
 * Props:
 *   - narration: { paragraphs: [{text}], suggested_questions: [string] }
 *   - collapsed + onToggle: controlled by AppShell
 *   - onAsk: callback(question) for suggested-question clicks
 */


function AtlasAvatar({ size = 40 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: `linear-gradient(135deg, ${tok.atlas}, ${tok.atlasDeep})`,
      display: "flex", alignItems: "center", justifyContent: "center",
      color: "#fff", fontFamily: tok.fontDisplay, fontWeight: 700,
      fontSize: size * 0.45, position: "relative", flexShrink: 0,
    }}>
      A
      <span style={{
        content: '""', position: "absolute",
        bottom: -1, right: -1, width: 10, height: 10, borderRadius: "50%",
        background: tok.green, border: "2px solid #FAFBFE",
      }}/>
    </div>
  );
}

  const questions = narration?.suggested_questions || [];

    <div style={{
      padding: "24px 22px",
      display: "flex", flexDirection: "column", height: "100%",
      overflowY: "auto",

      {/* Head */}

        paddingBottom: 18, borderBottom: `1px solid ${tok.border}`,
        marginBottom: 20,

        <div style={{ flex: 1 }}>
          <div style={{
            fontFamily: tok.fontDisplay, fontSize: 15, fontWeight: 600,
            letterSpacing: "-.01em", lineHeight: 1.1,
          }}>Atlas</div>
          <div style={{ fontSize: 11, color: tok.text3, marginTop: 2 }}>
            Your analyst · Online
          </div>
        </div>
        <button
          onClick={onCollapse}
          title="Collapse"
          style={{
            width: 28, height: 28, borderRadius: 6,
            background: "transparent", border: `1px solid ${tok.border}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            cursor: "pointer", color: tok.text2, fontSize: 12,
            fontWeight: 700, fontFamily: tok.fontUi,
          }}
        >→</button>
      </div>

      {/* Narration */}
      <div style={{ marginBottom: 22, fontSize: 13, lineHeight: 1.6, color: tok.text }}>
        {paragraphs.map((p, i) => (
          <p key={i} style={{ marginBottom: 12 }}>{renderNarrationHighlights(p.text)}</p>
        ))}
      </div>

      {/* Suggested questions */}
      {questions.length > 0 && (
        <>
          <div style={{
            fontSize: 10, color: tok.text3,
            textTransform: "uppercase", letterSpacing: "0.18em",
            marginBottom: 10, fontWeight: 600,
          }}>Suggested questions</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: "auto" }}>
            {questions.map((q, i) => (
              <button
                key={i}
                onClick={() => onAsk && onAsk(q)}
                style={{
                  padding: "11px 14px",
                  background: tok.card, border: `1px solid ${tok.border}`,
                  borderRadius: 6, fontSize: 12, color: tok.text2,
                  cursor: "pointer", lineHeight: 1.4, textAlign: "left",
                  fontFamily: tok.fontUi,
                  transition: "all .2s",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = tok.atlas;
                  e.currentTarget.style.color = tok.text;
                  e.currentTarget.style.background = tok.atlasSoft;
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = tok.border;
                  e.currentTarget.style.color = tok.text2;
                  e.currentTarget.style.background = tok.card;
                }}
              >
                <span style={{ color: tok.atlas, marginRight: 8, fontWeight: 700 }}>›</span>
                {q}

          </div>
        </>
      )}

function AtlasRail({ narration, collapsed, onToggle, onAsk }) {

    <aside style={{

/** Inline Atlas callout — shown inside the main flow when the rail is collapsed. */

  const first = narration?.paragraphs?.[0];
  if (!first) return null;
  return (
    <div style={{

      border: "1px solid #F2D89A",
      borderLeft: `3px solid ${tok.atlas}`,

      display: "flex", alignItems: "flex-start", gap: 14,

      <div style={{
        width: 32, height: 32, borderRadius: "50%",

/** Bold monetary figures in Atlas narration text so they stand out. */
function renderNarrationHighlights(text) {
  if (!text) return null;
  // Split on ₹X Cr / ₹X.Y Cr / ₹X L patterns and wrap them
  const parts = text.split(/(₹[\d,]+(?:\.\d+)?\s*(?:Cr|L))/g);
  return parts.map((part, i) => {
    if (/^₹[\d,]+(?:\.\d+)?\s*(?:Cr|L)$/.test(part)) {
      return <strong key={i} style={{ color: tok.atlasDeep, fontWeight: 600 }}>{part}</strong>;
    }
    return <React.Fragment key={i}>{part}</React.Fragment>;
  });
}

// Replace the imported panelStyle refs with local ones since we have tok
const panelStyleLocal = panelStyle;
const panelHeadingStyleLocal = panelHeadingStyle;
const panelTagStyleLocal = panelTagStyle;

/**
 * MarketContextPanel
 *
 * Renders the left card of Screen 01's bottom row. Shows a demand-trend
 * area chart over a macro baseline lookback window (default 4 months,
 * to match the HTML reference's "Last 90 Days" framing).
 *
 * Data contract: the `data.demand_trend.points` array from
 *   GET /api/market-context
 * Each point: { month: "YYYY-MM", value: number, label: "Mar" }
 *
 * Design references:
 *   - 05-hybrid-executive-summary.html  (bottom-row left card)
 *   - Build plan v2 §2A.3 (macro baseline feeds Screen 01)
 *
 * Intentionally stateless and pure — passes all data in via props so it
 * drops into either the current app or a fresh Vite rebuild.
 */


const CHART_W = 400;
const CHART_H = 140;
const PAD_TOP = 10;
const PAD_BOTTOM = 18;  // leaves room for month labels

/**
 * Given an array of { value } points, return an SVG path `d` string for
 * a line (no fill) going through them, left-to-right.
 */
function buildLinePath(points) {
  if (points.length === 0) return "";
  const { xs, ys } = mapPoints(points);
  return xs.map((x, i) => (i === 0 ? `M${x},${ys[i]}` : `L${x},${ys[i]}`)).join(" ");
}

/**
 * Area fill version — same line but closed at the bottom of the chart.
 */
function buildAreaPath(points) {
  if (points.length === 0) return "";
  const { xs, ys } = mapPoints(points);
  const line = xs.map((x, i) => (i === 0 ? `M${x},${ys[i]}` : `L${x},${ys[i]}`)).join(" ");
  const lastX = xs[xs.length - 1];
  const firstX = xs[0];
  return `${line} L${lastX},${CHART_H} L${firstX},${CHART_H} Z`;
}

/**
 * Map the raw values into chart-space coordinates. The y-axis auto-scales
 * to the data's min/max with a small headroom so the line doesn't kiss
 * the card edges.
 */
function mapPoints(points) {
  const values = points.map(p => p.value);
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;  // avoid /0 when all values equal
  const headroom = range * 0.15;
  const yMin = minV - headroom;
  const yMax = maxV + headroom;

  const innerH = CHART_H - PAD_TOP - PAD_BOTTOM;
  const xStep = points.length > 1 ? CHART_W / (points.length - 1) : 0;

  const xs = points.map((_, i) => i * xStep);
  const ys = points.map(p => {
    const t = (p.value - yMin) / (yMax - yMin);
    return PAD_TOP + (1 - t) * innerH;
  });
  return { xs, ys };
}

function DemandTrendChart({ points }) {
  if (!points || points.length === 0) {
    return (
      <div style={{
        height: CHART_H, display: "flex", alignItems: "center",
        justifyContent: "center", color: tok.text3, fontSize: 12,
      }}>
        No macro data available for the selected window.
      </div>
    );
  }

  const { xs, ys } = mapPoints(points);
  const linePath = buildLinePath(points);
  const areaPath = buildAreaPath(points);

  return (
    <div style={{ height: CHART_H, marginTop: 8 }}>
      <svg
        viewBox={`0 0 ${CHART_W} ${CHART_H}`}
        preserveAspectRatio="none"
        style={{ width: "100%", height: "100%" }}
      >
        <defs>
          <linearGradient id="mc-gradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={tok.accent} stopOpacity="0.25" />
            <stop offset="100%" stopColor={tok.accent} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={areaPath} fill="url(#mc-gradient)" />
        <path d={linePath} stroke={tok.accent} strokeWidth="2" fill="none" />

        {/* Month labels below the chart */}
        <g fontSize="9" fill={tok.text3} fontFamily={tok.fontUi}>
          {points.map((p, i) => (
            <text
              key={p.month}
              x={xs[i]}
              y={CHART_H - 3}
              textAnchor={i === 0 ? "start" : i === points.length - 1 ? "end" : "middle"}
            >
              {p.label}
            </text>
          ))}
        </g>
      </svg>
    </div>
  );
}

function MarketContextPanel({ data, loading, error }) {
  if (loading) {
    return (
      <div style={panelStyleLocal}>
        <div style={panelHeadingStyle}>Market Context</div>
        <div style={panelTagStyle}>Demand Trend</div>
        <div style={{ height: CHART_H, ...centeredStyle, color: tok.text3 }}>Loading…</div>
      </div>
    );
  }

  if (error) {
    return (
      <div style={panelStyleLocal}>
        <div style={panelHeadingStyle}>Market Context</div>
        <div style={panelTagStyle}>Demand Trend</div>
        <div style={{ height: CHART_H, ...centeredStyle, color: tok.red, fontSize: 12 }}>
          {String(error)}
        </div>
      </div>
    );
  }

  const points = data?.demand_trend?.points ?? [];
  const lookback = data?.demand_trend?.lookback_months;
  const tag = lookback
    ? `Demand trend — last ${lookback} months`
    : "Demand trend";

  return (
    <div style={panelStyleLocal}>
      <div style={panelHeadingStyle}>Market Context</div>
      <div style={panelTagStyle}>{tag}</div>
      <DemandTrendChart points={points} />
    </div>
  );
}

const centeredStyle = {
  display: "flex",
  alignItems: "center",
  justifyContent: "center",
};


/**
 * UpcomingPeakWindowsPanel
 *
 * Renders the right card of Screen 01's bottom row. Lists upcoming
 * festivals + public holidays with an impact badge, sourced from the
 * centrally-curated macro baseline.
 *
 * Data contract: the `data.upcoming_peaks` array from
 *   GET /api/market-context
 * Each peak: { start_date, end_date, name, kind, significance,
 *              significance_score, regions, notes, days_away }
 *
 * Design references:
 *   - 05-hybrid-executive-summary.html  (bottom-row right card)
 */


const SHORT_MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

/**
 * Format a date range like the HTML reference:
 *   "Jun 14 – Jun 28"   for multi-day
 *   "Aug 15"            for single-day
 * Inputs are ISO strings from the API.
 */
function formatDateRange(startISO, endISO) {
  const s = new Date(startISO);
  const e = new Date(endISO);
  const startStr = `${SHORT_MONTHS[s.getUTCMonth()]} ${s.getUTCDate()}`;
  if (startISO === endISO) return startStr;
  const endStr = `${SHORT_MONTHS[e.getUTCMonth()]} ${e.getUTCDate()}`;
  return `${startStr} – ${endStr}`;
}

/** Map significance display string to a badge style (red-soft / amber-soft). */
function badgeStyleFor(significance) {
  if (significance === "High") {
    return { background: tok.redSoft, color: "#B91C1C" };
  }
  if (significance === "Medium") {
    return { background: tok.amberSoft, color: "#92400E" };
  }
  return { background: tok.bg, color: tok.text3 };
}

function PeakRow({ peak, isLast }) {
  const range = formatDateRange(peak.start_date, peak.end_date);
  const badge = badgeStyleFor(peak.significance);

  return (
    <div style={{
      display: "flex",
      justifyContent: "space-between",
      alignItems: "center",
      padding: "10px 0",
      borderBottom: isLast ? "none" : `1px solid ${tok.border}`,
      fontSize: 12,
    }}>
      <div>
        <div style={{ fontWeight: 600 }}>{range}</div>
        <div style={{ color: tok.text2, fontSize: 11, marginTop: 2 }}>
          {peak.name}
        </div>
      </div>
      <span style={{
        padding: "2px 8px",
        borderRadius: 4,
        fontSize: 10,
        fontWeight: 600,
        ...badge,
      }}>
        {peak.significance}
      </span>
    </div>
  );
}

function UpcomingPeakWindowsPanel({ data, loading, error }) {
  if (loading) {
    return (
      <div style={panelStyle}>
        <div style={panelHeadingStyle}>Upcoming Peak Windows</div>
        <div style={panelTagStyle}>Plan ahead</div>
        <div style={{ color: tok.text3, padding: "20px 0", fontSize: 12 }}>Loading…</div>
      </div>
    );
  }

  if (error) {
    return (
      <div style={panelStyle}>
        <div style={panelHeadingStyle}>Upcoming Peak Windows</div>
        <div style={panelTagStyle}>Plan ahead</div>
        <div style={{ color: tok.red, padding: "20px 0", fontSize: 12 }}>{String(error)}</div>
      </div>
    );
  }

  const peaks = data?.upcoming_peaks ?? [];

  if (peaks.length === 0) {
    return (
      <div style={panelStyle}>
        <div style={panelHeadingStyle}>Upcoming Peak Windows</div>
        <div style={panelTagStyle}>Plan ahead</div>
        <div style={{
          color: tok.text3,
          padding: "24px 0",
          fontSize: 12,
          fontStyle: "italic",
        }}>
          No peak windows in the lookahead range. Macro baseline is
          sparse during this period — expand the window or check back
          closer to festival season.
        </div>
      </div>
    );
  }

  return (
    <div style={panelStyle}>
      <div style={panelHeadingStyle}>Upcoming Peak Windows</div>
      <div style={panelTagStyle}>Plan ahead</div>
      {peaks.map((peak, i) => (
        <PeakRow
          key={`${peak.name}-${peak.start_date}`}
          peak={peak}
          isLast={i === peaks.length - 1}
        />
      ))}
    </div>
  );
}
