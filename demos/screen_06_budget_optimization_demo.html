/**
 * AtlasRail — the collapsible right-hand panel that hosts Atlas's
 * per-screen narration and suggested questions.
 *
 * When collapsed, a 56px strip remains showing only the avatar + vertical
 * label + expand button. The screen's main flow can include an
 * <AtlasInlineCallout/> so users still see Atlas's headline when the
 * rail is collapsed.
 *
 * Props:
 *   - narration: { paragraphs: [{text}], suggested_questions: [string] }
 *   - collapsed + onToggle: controlled by AppShell
 *   - onAsk: callback(question) for suggested-question clicks
 */


function AtlasAvatar({ size = 40 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: `linear-gradient(135deg, ${tok.atlas}, ${tok.atlasDeep})`,
      display: "flex", alignItems: "center", justifyContent: "center",
      color: "#fff", fontFamily: tok.fontDisplay, fontWeight: 700,
      fontSize: size * 0.45, position: "relative", flexShrink: 0,
    }}>
      A
      <span style={{
        content: '""', position: "absolute",
        bottom: -1, right: -1, width: 10, height: 10, borderRadius: "50%",
        background: tok.green, border: "2px solid #FAFBFE",
      }}/>
    </div>
  );
}

  const paragraphs = narration?.paragraphs || [];
  const questions = narration?.suggested_questions || [];

  return (
    <div style={{

      display: "flex", flexDirection: "column", height: "100%",
      overflowY: "auto",

          }}>Atlas</div>
          <div style={{ fontSize: 11, color: tok.text3, marginTop: 2 }}>
            Your analyst · Online
          </div>
        </div>
        <button
          onClick={onCollapse}
          title="Collapse"
          style={{
            width: 28, height: 28, borderRadius: 6,
            background: "transparent", border: `1px solid ${tok.border}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            cursor: "pointer", color: tok.text2, fontSize: 12,
            fontWeight: 700, fontFamily: tok.fontUi,
          }}

      </div>

      {/* Narration */}
      <div style={{ marginBottom: 22, fontSize: 13, lineHeight: 1.6, color: tok.text }}>
        {paragraphs.map((p, i) => (
          <p key={i} style={{ marginBottom: 12 }}>{renderNarrationHighlights(p.text)}</p>
        ))}
      </div>

      {/* Suggested questions */}
      {questions.length > 0 && (
        <>
          <div style={{
            fontSize: 10, color: tok.text3,
            textTransform: "uppercase", letterSpacing: "0.18em",
            marginBottom: 10, fontWeight: 600,
          }}>Suggested questions</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: "auto" }}>
            {questions.map((q, i) => (
              <button
                key={i}
                onClick={() => onAsk && onAsk(q)}
                style={{
                  padding: "11px 14px",
                  background: tok.card, border: `1px solid ${tok.border}`,
                  borderRadius: 6, fontSize: 12, color: tok.text2,
                  cursor: "pointer", lineHeight: 1.4, textAlign: "left",
                  fontFamily: tok.fontUi,
                  transition: "all .2s",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = tok.atlas;
                  e.currentTarget.style.color = tok.text;
                  e.currentTarget.style.background = tok.atlasSoft;
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = tok.border;
                  e.currentTarget.style.color = tok.text2;
                  e.currentTarget.style.background = tok.card;
                }}

                <span style={{ color: tok.atlas, marginRight: 8, fontWeight: 700 }}>›</span>
                {q}
              </button>
            ))}
          </div>
        </>
      )}

      {/* Input box (non-functional placeholder in v1 — template-driven only) */}

        marginTop: 18, paddingTop: 18,

        <div style={{

/** Inline Atlas callout — shown inside the main flow when the rail is collapsed. */
function AtlasInlineCallout({ narration }) {
  const first = narration?.paragraphs?.[0];
  if (!first) return null;
  return (
    <div style={{
      background: `linear-gradient(135deg, ${tok.atlasSoft}, #FEFAEC)`,
      border: "1px solid #F2D89A",
      borderLeft: `3px solid ${tok.atlas}`,
      borderRadius: 10,
      padding: "16px 20px",
      marginBottom: 18,
      display: "flex", alignItems: "flex-start", gap: 14,
    }}>
      <div style={{
        width: 32, height: 32, borderRadius: "50%",
        background: `linear-gradient(135deg, ${tok.atlas}, ${tok.atlasDeep})`,
        display: "flex", alignItems: "center", justifyContent: "center",
        color: "#fff", fontFamily: tok.fontDisplay, fontWeight: 700,
        fontSize: 14, flexShrink: 0,
      }}>A</div>
      <div style={{ flex: 1 }}>
        <div style={{
          fontFamily: tok.fontDisplay, fontWeight: 600, fontSize: 13,
          color: tok.atlasDeep, marginBottom: 4, fontStyle: "italic",
        }}>Atlas notes</div>
        <div style={{ fontSize: 13, color: tok.text, lineHeight: 1.55 }}>
          {renderNarrationHighlights(first.text)}
        </div>
      </div>
    </div>
  );
}

/** Bold monetary figures in Atlas narration text so they stand out. */
function renderNarrationHighlights(text) {
  if (!text) return null;
  // Split on ₹X Cr / ₹X.Y Cr / ₹X L patterns and wrap them
  const parts = text.split(/(₹[\d,]+(?:\.\d+)?\s*(?:Cr|L))/g);
  return parts.map((part, i) => {
    if (/^₹[\d,]+(?:\.\d+)?\s*(?:Cr|L)$/.test(part)) {
      return <strong key={i} style={{ color: tok.atlasDeep, fontWeight: 600 }}>{part}</strong>;
    }
    return <React.Fragment key={i}>{part}</React.Fragment>;
  });
}

/**
 * Donut — renders a donut chart from allocation slices.
 *
 * Props:
 *   - slices: Array<{ channel, color, percentage }>  // percentages sum ≤ 100
 *   - centerLabel, centerSub
 *   - size: pixel size (default 140)
 */


const STROKE = 3;
const R = 15.915;  // 2πR = 100 → percentage maps directly to stroke-dasharray

function Donut({
  slices = [],
  centerLabel,
  centerSub,
  centerColor,
  size = 140,
}) {
  let offset = 0;
  return (
    <div style={{
      position: "relative", width: size, height: size, flexShrink: 0,
    }}>
      <svg viewBox="0 0 36 36" style={{ width: "100%", height: "100%" }}>
        {/* Track */}
        <circle cx="18" cy="18" r={R} fill="none"
                stroke={tok.border} strokeWidth={STROKE}/>
        {/* Slices */}
        {slices.map((s, i) => {
          const pct = Math.max(0, Math.min(100, s.percentage || 0));
          const dash = `${pct} ${100 - pct}`;
          const dashOffset = -offset;
          offset += pct;
          return (
            <circle
              key={s.channel + i}
              cx="18" cy="18" r={R} fill="none"
              stroke={s.color} strokeWidth={STROKE}
              strokeDasharray={dash}
              strokeDashoffset={dashOffset}
              transform="rotate(-90 18 18)"
            />
          );
        })}
      </svg>
      {(centerLabel || centerSub) && (
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
        }}>
          {centerLabel && (
            <div style={{
              fontFamily: tok.fontDisplay, fontSize: 18, fontWeight: 600,
              letterSpacing: "-.02em", color: centerColor || tok.text,
            }}>{centerLabel}</div>
          )}
          {centerSub && (
            <div style={{
              fontSize: 9, color: tok.text3,
              textTransform: "uppercase", letterSpacing: "0.12em",
              marginTop: 2, fontWeight: 600,
            }}>{centerSub}</div>
          )}
        </div>
      )}
    </div>
  );
}

function AllocationComparison({
  allocation,
  onScoreOverride,
  revealed: controlledRevealed,
  onReveal,
}) {
  const [internalRevealed, setInternalRevealed] = useState(false);
  const revealed = controlledRevealed !== undefined ? controlledRevealed : internalRevealed;
  const handleReveal = () => {
    setInternalRevealed(true);
    if (onReveal) onReveal();
  };

  const [editing, setEditing] = useState(false);
  const [userValues, setUserValues] = useState({});
  const [scoreResult, setScoreResult] = useState(null);

  // Initialize user values from Atlas recommendation
  useEffect(() => {
    if (revealed && allocation?.recommended) {
      const init = {};
      allocation.recommended.forEach(s => {
        init[s.channel] = +(s.amount / 1e7).toFixed(1);
      });
      setUserValues(init);
    }
  }, [revealed, allocation]);

  const userTotal = useMemo(
    () => Object.values(userValues).reduce((a, b) => a + (b || 0), 0),
    [userValues]
  );
  const budgetTotal = (allocation?.total_budget ?? 0) / 1e7;

  // When editing, fetch override score after debounce
  useEffect(() => {
    if (!editing || !onScoreOverride) return;
    const id = setTimeout(() => {
      onScoreOverride(userValues).then(setScoreResult).catch(() => setScoreResult(null));
    }, 350);
    return () => clearTimeout(id);
  }, [editing, userValues, onScoreOverride]);

  const handleUserChange = useCallback((channel, val) => {
    setUserValues(prev => ({ ...prev, [channel]: val }));
  }, []);

  const handleReset = () => {
    if (!allocation?.recommended) return;
    const init = {};
    allocation.recommended.forEach(s => {
      init[s.channel] = +(s.amount / 1e7).toFixed(1);
    });
    setUserValues(init);
    setScoreResult(null);
  };

  if (!allocation) return null;

  return (
    <div style={{
      background: tok.card, border: `1px solid ${tok.border}`,
      borderRadius: 12, padding: "22px 24px", marginBottom: 18,
      fontFamily: tok.fontUi,
    }}>
      {/* Head */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        marginBottom: 18,
      }}>
        <div style={{
          fontFamily: tok.fontDisplay, fontSize: 18, fontWeight: 600,
          letterSpacing: "-.01em",
        }}>Current vs Recommended Allocation</div>
        <div style={{ fontSize: 12, color: tok.text2 }}>
          Total budget · <strong>{allocation.total_budget_display}</strong>
        </div>
      </div>

      {/* Comparison grid */}
      <div style={{
        display: "grid",
        gridTemplateColumns: revealed ? "1fr 1fr" : "1fr 1fr",
        gap: 20,
      }}>
        <CurrentSide current={allocation.current} totalDisplay={allocation.total_budget_display}/>
        {!revealed ? (
          <EarnedRevealCTA onReveal={handleReveal}/>
        ) : (
          <RecommendedSide
            recommended={allocation.recommended}
            totalDisplay={allocation.total_budget_display}
            editing={editing}
            userValues={userValues}
            onUserChange={handleUserChange}
          />
        )}
      </div>

      {/* Edit-mode extras */}
      {editing && (
        <>
          <EditTotalBar userTotal={userTotal} budgetTotal={budgetTotal}/>
          <AtlasPushback pushback={scoreResult?.pushback}/>
        </>
      )}

      {/* Toggle row */}
      {revealed && (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          marginTop: 20, paddingTop: 16,
          borderTop: `1px solid ${tok.border}`,
          gap: 16,
        }}>
          <div style={{ fontSize: 12, color: tok.text2, flex: 1 }}>
            Need to override Atlas's recommendation? <strong>You can edit individual channels</strong> — Atlas flags overrides that hurt the plan.
          </div>
          <button
            onClick={() => {
              if (editing) handleReset();
              setEditing(e => !e);
            }}
            style={{
              padding: "9px 16px",
              background: editing ? tok.card : tok.accent,
              color: editing ? tok.text : "#fff",
              border: `1px solid ${editing ? tok.border : tok.accent}`,
              borderRadius: 8,
              fontFamily: "inherit", fontSize: 12, fontWeight: 600,
              cursor: "pointer",
              display: "flex", alignItems: "center", gap: 6,
            }}
          >
            {editing ? "Cancel" : "✎ Override recommendation"}
          </button>
        </div>
      )}
    </div>
  );
}

// Mock override scorer — matches the backend's behavior closely
async function mockScoreOverride(userAlloc) {
  // Atlas plan in Cr
  const atlasAlloc = {};
  SAMPLE.allocation.recommended.forEach(s => { atlasAlloc[s.channel] = s.amount / 1e7; });
  // Marginal ROIs per channel (from source data, rough)
  const marginals = {
    'Search': 3.6, 'Meta Ads': 0.2, 'LinkedIn': 3.2,
    'Display': 0.62, 'YouTube': 2.1, 'Others': 0.3,
  };
  let penalty = 0; let worst = null;
  for (const ch of Object.keys(atlasAlloc)) {
    const diff = (userAlloc[ch] || atlasAlloc[ch]) - atlasAlloc[ch];
    const m = marginals[ch] || 1;
    penalty += Math.abs(diff) * m * 0.5;
    if (Math.abs(diff) > 1 && (!worst || Math.abs(diff) * m > Math.abs(worst.diff) * worst.m)) {
      worst = { channel: ch, diff, m };
    }
  }
  const deltaVsAtlas = -penalty;
  let pushback = null;
  if (deltaVsAtlas < -1 && worst) {
    pushback = {
      headline: `Heads up — that override hurts the plan by ~₹${Math.abs(deltaVsAtlas).toFixed(1)} Cr.`,
      detail: `${worst.channel} moved by ₹${Math.abs(worst.diff).toFixed(1)} Cr. Its marginal ROI is ${worst.m.toFixed(2)}x, so the lost lift compounds.`,
    };
  }
  return { delta_vs_atlas_cr: +deltaVsAtlas.toFixed(2), pushback };
}
